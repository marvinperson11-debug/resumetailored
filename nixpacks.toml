[phases.setup]
# `chromium` is installed for its shared libraries (libnss, libatk, …) that
# Remotion's downloaded chrome-headless-shell links against at runtime. We no
# longer launch this chromium binary directly — recent builds removed the old
# headless mode Remotion relies on — so the renderer uses chrome-headless-shell
# instead (see remotion/render.js). espeak-ng is the robotic fallback voice;
# Piper (below) is the good one.
nixPkgs = ["nodejs", "python3", "gcc", "gnumake", "chromium", "fontconfig", "dejavu_fonts", "espeak-ng"]

# Pre-download Remotion's chrome-headless-shell at build time (network is
# available here) so the first video render doesn't pay a download cost or need
# runtime network. Guarded with `|| true`: if it fails, render.js falls back to
# downloading the shell on first use.
[phases.browser]
dependsOn = ["install"]
cmds = ["node -e \"require('@remotion/renderer').ensureBrowser()\" || true"]

# Install Piper (natural neural TTS) + a default English voice for the resume
# video voiceover. Every step is guarded with `|| true`: if Piper can't be set
# up the deploy still succeeds and remotion/narration.js falls back to espeak-ng.
[phases.piper]
dependsOn = ["install"]
cmds = [
  "python3 -m ensurepip --upgrade || true",
  "python3 -m pip install --break-system-packages --quiet piper-tts || python3 -m pip install --quiet piper-tts || true",
  "python3 -m piper.download_voices en_US-lessac-medium --data-dir ./piper-voices || true",
]
