  <!-- Sub text -->
  <text x="72" y="498" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.55)">The only thing that changed: an AI-tailored resume</text>

  <!-- Right side stat visual -->
  <rect x="750" y="56" width="410" height="440" rx="24" fill="rgba(245,200,66,0.06)" stroke="rgba(245,200,66,0.15)" stroke-width="1.5"/>

