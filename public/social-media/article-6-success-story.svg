<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 644" width="1200" height="644">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="rgba(245,200,66,0)"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="644" fill="url(#bg)"/>
  <circle cx="1050" cy="320" r="400" fill="rgba(245,200,66,0.04)"/>

  <!-- Gold top line -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#goldFade)"/>

  <!-- Tag -->
  <rect x="60" y="68" width="170" height="34" rx="17" fill="rgba(245,200,66,0.15)" stroke="rgba(245,200,66,0.4)" stroke-width="1"/>
  <text x="145" y="90" font-family="Arial,sans-serif" font-weight="700" font-size="14" fill="#f5c842" text-anchor="middle">SUCCESS STORY</text>

  <!-- Big quote marks -->
  <text x="52" y="200" font-family="Arial,sans-serif" font-size="200" fill="rgba(245,200,66,0.12)" font-weight="900">"</text>

  <!-- Quote -->
  <text x="72" y="218" font-family="Arial,sans-serif" font-weight="900" font-size="54" fill="white" letter-spacing="-2">I went from 0 callbacks</text>
  <text x="72" y="290" font-family="Arial,sans-serif" font-weight="900" font-size="54" fill="white" letter-spacing="-2">in 3 months to</text>
  <text x="72" y="362" font-family="Arial,sans-serif" font-weight="900" font-size="54" fill="#f5c842" letter-spacing="-2">3 interviews in 1 week.</text>

