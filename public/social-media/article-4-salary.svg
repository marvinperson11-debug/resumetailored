  <rect x="276" y="470" width="210" height="42" rx="21" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.35)" stroke-width="1"/>
  <text x="381" y="496" font-family="Arial,sans-serif" font-weight="700" font-size="14" fill="#4ade80" text-anchor="middle">Benchmark your worth</text>

  <rect x="502" y="470" width="186" height="42" rx="21" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.35)" stroke-width="1"/>
  <text x="595" y="496" font-family="Arial,sans-serif" font-weight="700" font-size="14" fill="#4ade80" text-anchor="middle">Counter via email</text>

