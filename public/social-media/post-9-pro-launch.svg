  <text x="200" y="680" font-family="'Inter',Arial,sans-serif" font-size="24" fill="rgba(255,255,255,0.9)">✦  All premium resume templates</text>
  <text x="200" y="725" font-family="'Inter',Arial,sans-serif" font-size="24" fill="rgba(255,255,255,0.9)">✦  Priority AI processing</text>

