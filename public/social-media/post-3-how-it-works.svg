<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="1000" cy="100" r="220" fill="rgba(255,255,255,0.04)"/>
  <circle cx="80" cy="980" r="200" fill="rgba(255,255,255,0.04)"/>

  <!-- Logo -->
  <rect x="80" y="70" width="44" height="44" rx="10" fill="rgba(255,255,255,0.2)"/>
  <text x="102" y="101" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="24" fill="white" text-anchor="middle">R</text>
  <text x="136" y="100" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="18" fill="white">ResumeTailored AI</text>

  <!-- Badge -->
  <rect x="80" y="160" width="200" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
  <text x="180" y="185" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="16" fill="white" text-anchor="middle">HOW IT WORKS</text>

  <!-- Headline -->
  <text x="80" y="275" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="64" fill="white" letter-spacing="-2">3 Steps to a</text>
  <text x="80" y="355" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="64" fill="#93c5fd" letter-spacing="-2">Tailored Resume</text>

  <!-- Step 1 -->
  <rect x="80" y="420" width="920" height="140" rx="20" fill="rgba(255,255,255,0.1)"/>
  <rect x="80" y="420" width="10" height="140" rx="5" fill="#60a5fa"/>
  <text x="130" y="480" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="48" fill="rgba(255,255,255,0.2)">01</text>
  <text x="230" y="475" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="26" fill="white">Upload Your Resume</text>
  <text x="230" y="510" font-family="'Inter',Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.65)">Paste your existing resume or upload a PDF/DOCX file</text>

  <!-- Step 2 -->
  <rect x="80" y="580" width="920" height="140" rx="20" fill="rgba(255,255,255,0.1)"/>
  <rect x="80" y="580" width="10" height="140" rx="5" fill="#34d399"/>
  <text x="130" y="640" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="48" fill="rgba(255,255,255,0.2)">02</text>
  <text x="230" y="635" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="26" fill="white">Paste the Job Posting</text>
  <text x="230" y="670" font-family="'Inter',Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.65)">Copy any job description from LinkedIn, Indeed, or anywhere</text>

  <!-- Step 3 -->
  <rect x="80" y="740" width="920" height="140" rx="20" fill="rgba(255,255,255,0.1)"/>
  <rect x="80" y="740" width="10" height="140" rx="5" fill="#fbbf24"/>
  <text x="130" y="800" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="48" fill="rgba(255,255,255,0.2)">03</text>
  <text x="230" y="795" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="26" fill="white">Download Your Tailored Resume</text>
  <text x="230" y="830" font-family="'Inter',Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.65)">Get a perfectly optimized resume in under 60 seconds</text>

  <!-- CTA -->
  <rect x="80" y="940" width="360" height="70" rx="35" fill="white"/>
  <text x="260" y="983" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="22" fill="#2563eb" text-anchor="middle">Try Free at resumetailored.com</text>
</svg>
