<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#f9fafb"/>
  <rect width="1080" height="8" fill="#2563eb"/>

  <!-- Logo -->
  <rect x="80" y="60" width="44" height="44" rx="10" fill="#2563eb"/>
  <text x="102" y="91" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="24" fill="white" text-anchor="middle">R</text>
  <text x="136" y="90" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="18" fill="#111827">ResumeTailored AI</text>

  <!-- Envelope icon area -->
  <rect x="80" y="155" width="920" height="340" rx="20" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <!-- Envelope shape -->
  <rect x="340" y="195" width="400" height="260" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Envelope flap lines -->
  <line x1="340" y1="195" x2="540" y2="310" stroke="#bfdbfe" stroke-width="2"/>
  <line x1="740" y1="195" x2="540" y2="310" stroke="#bfdbfe" stroke-width="2"/>
  <!-- Letter lines inside envelope -->
  <rect x="370" y="340" width="340" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="370" y="360" width="300" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="370" y="380" width="320" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="370" y="400" width="280" height="8" rx="4" fill="#e5e7eb"/>
  <!-- AI badge -->
  <rect x="630" y="200" width="90" height="32" rx="16" fill="#2563eb"/>
  <text x="675" y="221" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="14" fill="white" text-anchor="middle">✦ AI</text>

  <!-- Headline -->
  <text x="80" y="580" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="62" fill="#111827" letter-spacing="-2">Cover Letters That</text>
  <text x="80" y="654" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="62" fill="#2563eb" letter-spacing="-2">Don't Sound Generic.</text>

  <!-- Divider -->
  <rect x="80" y="690" width="80" height="5" rx="3" fill="#2563eb"/>

  <!-- Body -->
  <text x="80" y="750" font-family="'Inter',Arial,sans-serif" font-size="26" fill="#374151">Every application deserves a unique cover letter.</text>
  <text x="80" y="792" font-family="'Inter',Arial,sans-serif" font-size="26" fill="#374151">Our AI writes one tailored to the exact role —</text>
  <text x="80" y="834" font-family="'Inter',Arial,sans-serif" font-size="26" fill="#374151">in your voice, for that company, for that job.</text>

  <!-- Feature pills -->
  <rect x="80" y="880" width="190" height="44" rx="22" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="175" y="907" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="16" fill="#2563eb" text-anchor="middle">Personalized</text>

  <rect x="286" y="880" width="190" height="44" rx="22" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="381" y="907" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="16" fill="#2563eb" text-anchor="middle">Professional</text>

  <rect x="492" y="880" width="190" height="44" rx="22" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="587" y="907" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="16" fill="#2563eb" text-anchor="middle">Instant</text>

  <!-- URL -->
  <text x="80" y="1020" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="20" fill="#2563eb">resumetailored.com</text>
  <rect x="0" y="1072" width="1080" height="8" fill="#2563eb"/>
</svg>
