<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#f9fafb"/>
  <rect width="1080" height="8" fill="#2563eb"/>

  <!-- Logo -->
  <rect x="80" y="60" width="44" height="44" rx="10" fill="#2563eb"/>
  <text x="102" y="91" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="24" fill="white" text-anchor="middle">R</text>
  <text x="136" y="90" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="18" fill="#111827">ResumeTailored AI</text>

  <!-- Headline -->
  <text x="80" y="200" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="58" fill="#111827" letter-spacing="-2">More than a</text>
  <text x="80" y="270" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="58" fill="#2563eb" letter-spacing="-2">resume builder.</text>

  <text x="80" y="340" font-family="'Inter',Arial,sans-serif" font-size="24" fill="#6b7280">Your complete career companion — all in one place.</text>

  <!-- Cards grid 2x2 -->
  <!-- Card 1 -->
  <rect x="60" y="395" width="455" height="240" rx="20" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="60" y="395" width="455" height="6" rx="3" fill="#2563eb"/>
  <text x="100" y="462" font-family="'Inter',Arial,sans-serif" font-size="42">✦</text>
  <text x="100" y="516" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="24" fill="#111827">Resume Tailor</text>
  <text x="100" y="548" font-family="'Inter',Arial,sans-serif" font-size="18" fill="#6b7280">AI-matched to any job posting</text>
  <text x="100" y="575" font-family="'Inter',Arial,sans-serif" font-size="18" fill="#6b7280">in under 60 seconds</text>

  <!-- Card 2 -->
  <rect x="565" y="395" width="455" height="240" rx="20" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="565" y="395" width="455" height="6" rx="3" fill="#34d399"/>
  <text x="605" y="462" font-family="'Inter',Arial,sans-serif" font-size="42">✉</text>
  <text x="605" y="516" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="24" fill="#111827">Cover Letters</text>
  <text x="605" y="548" font-family="'Inter',Arial,sans-serif" font-size="18" fill="#6b7280">Personalized letters for every</text>
  <text x="605" y="575" font-family="'Inter',Arial,sans-serif" font-size="18" fill="#6b7280">application, instantly</text>

  <!-- Card 3 -->
  <rect x="60" y="655" width="455" height="240" rx="20" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="60" y="655" width="455" height="6" rx="3" fill="#f59e0b"/>
  <text x="100" y="722" font-family="'Inter',Arial,sans-serif" font-size="42">💰</text>
  <text x="100" y="776" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="24" fill="#111827">Salary Guide</text>
  <text x="100" y="808" font-family="'Inter',Arial,sans-serif" font-size="18" fill="#6b7280">Know your worth before</text>
  <text x="100" y="835" font-family="'Inter',Arial,sans-serif" font-size="18" fill="#6b7280">every negotiation</text>

  <!-- Card 4 -->
  <rect x="565" y="655" width="455" height="240" rx="20" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="565" y="655" width="455" height="6" rx="3" fill="#8b5cf6"/>
  <text x="605" y="722" font-family="'Inter',Arial,sans-serif" font-size="42">💬</text>
  <text x="605" y="776" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="24" fill="#111827">Community Forum</text>
  <text x="605" y="808" font-family="'Inter',Arial,sans-serif" font-size="18" fill="#6b7280">Connect with other job seekers,</text>
  <text x="605" y="835" font-family="'Inter',Arial,sans-serif" font-size="18" fill="#6b7280">share tips, get support</text>

  <!-- URL -->
  <text x="540" y="1020" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="20" fill="#2563eb" text-anchor="middle">resumetailored.com — Free to start</text>
  <rect x="0" y="1072" width="1080" height="8" fill="#2563eb"/>
