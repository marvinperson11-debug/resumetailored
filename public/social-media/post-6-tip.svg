<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="300" fill="rgba(37,99,235,0.15)"/>
  <circle cx="200" cy="900" r="250" fill="rgba(37,99,235,0.1)"/>

  <!-- Logo -->
  <rect x="80" y="70" width="44" height="44" rx="10" fill="rgba(255,255,255,0.15)"/>
  <text x="102" y="101" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="24" fill="white" text-anchor="middle">R</text>
  <text x="136" y="100" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="18" fill="rgba(255,255,255,0.8)">ResumeTailored AI</text>

  <!-- Tip badge -->
  <rect x="80" y="170" width="180" height="44" rx="22" fill="#2563eb"/>
  <text x="170" y="197" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="16" fill="white" text-anchor="middle">💡 JOB TIP</text>

  <!-- Quote mark -->
  <text x="80" y="370" font-family="Georgia,serif" font-size="200" fill="rgba(37,99,235,0.4)">"</text>

  <!-- Tip text -->
  <text x="80" y="420" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="52" fill="white" letter-spacing="-2">Never send the same</text>
  <text x="80" y="490" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="52" fill="white" letter-spacing="-2">resume twice.</text>

  <!-- Body -->
  <text x="80" y="575" font-family="'Inter',Arial,sans-serif" font-size="26" fill="rgba(255,255,255,0.65)">Recruiters can tell when it's generic. Every role has</text>
  <text x="80" y="615" font-family="'Inter',Arial,sans-serif" font-size="26" fill="rgba(255,255,255,0.65)">different priorities. Your resume should reflect that.</text>
  <text x="80" y="675" font-family="'Inter',Arial,sans-serif" font-size="26" fill="rgba(255,255,255,0.65)">ResumeTailored AI customizes it for you in seconds.</text>

  <!-- Divider -->
  <rect x="80" y="730" width="920" height="1.5" fill="rgba(255,255,255,0.12)"/>

  <!-- Bottom CTA -->
  <text x="80" y="800" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="22" fill="rgba(255,255,255,0.5)">Want more job search tips?</text>
  <text x="80" y="845" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="26" fill="#60a5fa">Follow us @ResumeTailoredAI</text>

  <!-- URL -->
  <rect x="80" y="940" width="320" height="56" rx="28" fill="rgba(255,255,255,0.1)"/>
  <text x="240" y="974" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="20" fill="white" text-anchor="middle">resumetailored.com</text>
</svg>
