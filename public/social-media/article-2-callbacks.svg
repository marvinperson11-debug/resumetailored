<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 644" width="1200" height="644">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="644" fill="url(#bg)"/>
  <!-- Top stripe -->
  <rect width="1200" height="8" fill="#2563eb"/>

  <!-- Tag -->
  <rect x="60" y="56" width="190" height="34" rx="17" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="155" y="78" font-family="Arial,sans-serif" font-weight="700" font-size="14" fill="#dc2626" text-anchor="middle">⚠  COMMON MISTAKE</text>

  <!-- Main headline -->
  <text x="60" y="175" font-family="Arial,sans-serif" font-weight="900" font-size="68" fill="#0f172a" letter-spacing="-2">Why Your Resume</text>
  <text x="60" y="255" font-family="Arial,sans-serif" font-weight="900" font-size="68" fill="#0f172a" letter-spacing="-2">Isn't Getting</text>
  <text x="60" y="335" font-family="Arial,sans-serif" font-weight="900" font-size="68" fill="#dc2626" letter-spacing="-2">Callbacks</text>

  <text x="60" y="400" font-family="Arial,sans-serif" font-size="22" fill="#64748b" font-weight="400">And exactly how to fix it — without rewriting your resume from scratch</text>

  <!-- Illustration: before/after pill -->
  <rect x="60" y="450" width="186" height="52" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="153" y="481" font-family="Arial,sans-serif" font-weight="700" font-size="15" fill="#dc2626" text-anchor="middle">❌  Generic Resume</text>

  <text x="270" y="481" font-family="Arial,sans-serif" font-size="26" fill="#2563eb">→</text>

  <rect x="310" y="450" width="220" height="52" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="420" y="481" font-family="Arial,sans-serif" font-weight="700" font-size="15" fill="#16a34a" text-anchor="middle">✅  AI-Tailored Resume</text>

  <!-- Right side: big visual card -->
  <rect x="720" y="80" width="430" height="470" rx="24" fill="white" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Phone bars mockup -->
  <rect x="744" y="112" width="384" height="54" rx="10" fill="#f8fafc"/>
  <rect x="760" y="128" width="140" height="12" rx="6" fill="#0f172a"/>
  <rect x="760" y="148" width="200" height="8" rx="4" fill="#94a3b8"/>

  <!-- 0 callbacks -->
  <rect x="744" y="178" width="384" height="60" rx="10" fill="#fef2f2"/>
  <text x="936" y="215" font-family="Arial,sans-serif" font-weight="800" font-size="18" fill="#dc2626" text-anchor="middle">❌  0 callbacks in 3 months</text>

  <rect x="744" y="250" width="384" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="744" y="270" width="340" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="744" y="290" width="300" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="744" y="312" width="384" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="744" y="332" width="360" height="10" rx="5" fill="#e2e8f0"/>

  <!-- Arrow -->
  <text x="936" y="390" font-family="Arial,sans-serif" font-size="36" fill="#2563eb" text-anchor="middle">↓ AI Tailored</text>

  <!-- 3 interviews -->
  <rect x="744" y="408" width="384" height="60" rx="10" fill="#f0fdf4"/>
  <text x="936" y="445" font-family="Arial,sans-serif" font-weight="800" font-size="18" fill="#16a34a" text-anchor="middle">✅  3 interviews — week 1</text>

  <rect x="744" y="484" width="384" height="10" rx="5" fill="#bfdbfe"/>
  <rect x="744" y="502" width="350" height="10" rx="5" fill="#dbeafe"/>
  <rect x="744" y="520" width="310" height="10" rx="5" fill="#bfdbfe"/>

  <!-- Bottom logo bar -->
  <rect x="0" y="578" width="1200" height="66" fill="#0f172a"/>
  <rect x="60" y="600" width="28" height="28" rx="7" fill="#2563eb"/>
  <text x="74" y="619" font-family="Arial,sans-serif" font-weight="900" font-size="15" fill="white" text-anchor="middle">R</text>
  <text x="100" y="619" font-family="Arial,sans-serif" font-weight="800" font-size="14" fill="white">ResumeTailored AI</text>
  <text x="1140" y="619" font-family="Arial,sans-serif" font-weight="600" font-size="14" fill="rgba(255,255,255,0.45)" text-anchor="end">resumetailored.com</text>
</svg>
