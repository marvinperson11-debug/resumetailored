  <text x="280" y="450" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="72" fill="#111827" text-anchor="middle">$0</text>
  <text x="280" y="490" font-family="'Inter',Arial,sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">forever</text>
  <line x1="100" y1="520" x2="460" y2="520" stroke="#e5e7eb" stroke-width="1"/>

  <text x="116" y="565" font-family="'Inter',Arial,sans-serif" font-size="19" fill="#374151">✓  1 AI tailoring per day</text>
