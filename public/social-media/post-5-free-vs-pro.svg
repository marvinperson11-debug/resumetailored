  <text x="116" y="655" font-family="'Inter',Arial,sans-serif" font-size="19" fill="#374151">✓  Resume templates</text>
  <text x="116" y="700" font-family="'Inter',Arial,sans-serif" font-size="19" fill="#374151">✓  Career Hub access</text>
  <text x="116" y="745" font-family="'Inter',Arial,sans-serif" font-size="19" fill="#d1d5db">✗  Unlimited tailoring</text>
  <text x="116" y="790" font-family="'Inter',Arial,sans-serif" font-size="19" fill="#d1d5db">✗  Priority processing</text>

