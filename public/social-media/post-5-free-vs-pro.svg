  <text x="636" y="655" font-family="'Inter',Arial,sans-serif" font-size="19" fill="white">✓  All premium templates</text>
  <text x="636" y="700" font-family="'Inter',Arial,sans-serif" font-size="19" fill="white">✓  Career Hub access</text>
  <text x="636" y="745" font-family="'Inter',Arial,sans-serif" font-size="19" fill="white">✓  Priority processing</text>
  <text x="636" y="790" font-family="'Inter',Arial,sans-serif" font-size="19" fill="white">✓  Cancel anytime</text>

  <rect x="620" y="880" width="360" height="52" rx="26" fill="white"/>
  <text x="800" y="912" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="18" fill="#2563eb" text-anchor="middle">Go Pro →</text>

  <!-- URL -->
  <text x="540" y="1040" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="20" fill="#2563eb" text-anchor="middle">resumetailored.com</text>
  <rect x="0" y="1072" width="1080" height="8" fill="#2563eb"/>
