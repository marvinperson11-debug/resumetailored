  <text x="800" y="275" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="14" fill="#92400e" text-anchor="middle">MOST POPULAR</text>

  <text x="800" y="365" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="22" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="2">PRO</text>
  <text x="800" y="450" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="72" fill="white" text-anchor="middle">$19</text>
