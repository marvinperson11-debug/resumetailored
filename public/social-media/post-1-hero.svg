<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="900" cy="180" r="300" fill="rgba(255,255,255,0.05)"/>
  <circle cx="180" cy="900" r="240" fill="rgba(255,255,255,0.04)"/>

  <!-- Logo -->
  <rect x="80" y="80" width="56" height="56" rx="14" fill="rgba(255,255,255,0.2)"/>
  <text x="108" y="119" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="32" fill="white" text-anchor="middle">R</text>
  <text x="154" y="116" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="20" fill="white">ResumeTailored AI</text>

  <!-- Main headline -->
  <text x="80" y="300" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="86" fill="white" letter-spacing="-3">Land Your</text>
  <text x="80" y="400" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="86" fill="white" letter-spacing="-3">Dream Job</text>
  <text x="80" y="500" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="86" fill="#60a5fa" letter-spacing="-3">Faster.</text>

  <!-- Description -->
  <text x="80" y="590" font-family="'Inter',Arial,sans-serif" font-weight="500" font-size="28" fill="rgba(255,255,255,0.75)">AI tailors your resume to every job posting.</text>
  <text x="80" y="630" font-family="'Inter',Arial,sans-serif" font-weight="500" font-size="28" fill="rgba(255,255,255,0.75)">Beat ATS filters. Get more interviews.</text>

  <!-- Stats row -->
  <rect x="80" y="700" width="200" height="100" rx="16" fill="rgba(255,255,255,0.12)"/>
  <text x="180" y="745" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">3x</text>
  <text x="180" y="775" font-family="'Inter',Arial,sans-serif" font-weight="600" font-size="15" fill="rgba(255,255,255,0.7)" text-anchor="middle">More Interviews</text>

  <rect x="300" y="700" width="200" height="100" rx="16" fill="rgba(255,255,255,0.12)"/>
  <text x="400" y="745" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">&lt;60s</text>
  <text x="400" y="775" font-family="'Inter',Arial,sans-serif" font-weight="600" font-size="15" fill="rgba(255,255,255,0.7)" text-anchor="middle">To Tailor</text>

  <rect x="520" y="700" width="200" height="100" rx="16" fill="rgba(255,255,255,0.12)"/>
  <text x="620" y="745" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">Free</text>
  <text x="620" y="775" font-family="'Inter',Arial,sans-serif" font-weight="600" font-size="15" fill="rgba(255,255,255,0.7)" text-anchor="middle">To Start</text>

  <!-- URL -->
  <rect x="80" y="940" width="320" height="56" rx="28" fill="rgba(255,255,255,0.15)"/>
  <text x="240" y="974" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="20" fill="white" text-anchor="middle">resumetailored.com</text>
</svg>
