<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="#f9fafb"/>

  <!-- Left blue panel -->
  <rect x="0" y="0" width="420" height="1080" fill="url(#bg)"/>
  <circle cx="210" cy="540" r="280" fill="rgba(255,255,255,0.06)"/>
  <circle cx="210" cy="540" r="180" fill="rgba(255,255,255,0.06)"/>

  <!-- Logo on blue -->
  <rect x="50" y="70" width="44" height="44" rx="10" fill="rgba(255,255,255,0.2)"/>
  <text x="72" y="101" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="24" fill="white" text-anchor="middle">R</text>

  <!-- Large number on blue -->
  <text x="210" y="460" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="200" fill="rgba(255,255,255,0.15)" text-anchor="middle">#1</text>
  <text x="210" y="500" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="44" fill="white" text-anchor="middle">Job Search</text>
  <text x="210" y="554" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="44" fill="white" text-anchor="middle">Mistake</text>

  <text x="210" y="640" font-family="'Inter',Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">Don't make this one</text>

  <!-- Right content -->
  <!-- Headline -->
  <text x="472" y="160" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="48" fill="#111827" letter-spacing="-2">Sending a</text>
  <text x="472" y="220" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="48" fill="#111827" letter-spacing="-2">one-size-fits-all</text>
  <text x="472" y="280" font-family="'Inter',Arial,sans-serif" font-weight="900" font-size="48" fill="#dc2626" letter-spacing="-2">resume.</text>

  <!-- Divider -->
  <rect x="472" y="320" width="60" height="5" rx="3" fill="#2563eb"/>

  <!-- Content -->
  <text x="472" y="380" font-family="'Inter',Arial,sans-serif" font-size="22" fill="#374151">Recruiters spend an average of</text>
  <text x="472" y="420" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="22" fill="#111827">7 seconds</text>
  <text x="472" y="460" font-family="'Inter',Arial,sans-serif" font-size="22" fill="#374151">scanning your resume. Make every</text>
  <text x="472" y="500" font-family="'Inter',Arial,sans-serif" font-size="22" fill="#374151">word count by matching it to the</text>
  <text x="472" y="540" font-family="'Inter',Arial,sans-serif" font-size="22" fill="#374151">specific job — every single time.</text>

  <!-- Fix it box -->
  <rect x="460" y="590" width="560" height="120" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="490" y="640" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="20" fill="#111827">The fix:</text>
  <text x="490" y="672" font-family="'Inter',Arial,sans-serif" font-size="19" fill="#374151">Let ResumeTailored AI tailor your resume</text>
  <text x="490" y="698" font-family="'Inter',Arial,sans-serif" font-size="19" fill="#374151">to each job posting automatically.</text>

  <!-- CTA -->
  <rect x="460" y="760" width="400" height="60" rx="30" fill="#2563eb"/>
  <text x="660" y="797" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="20" fill="white" text-anchor="middle">Try Free Today →</text>

  <text x="472" y="1020" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="18" fill="#6b7280">resumetailored.com</text>
