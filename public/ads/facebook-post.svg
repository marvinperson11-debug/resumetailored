  <text x="626" y="264" font-family="Arial,sans-serif" font-size="12" fill="#374151">• Reduced API latency by 40% across 3M daily requests via caching layer</text>
  <text x="626" y="282" font-family="Arial,sans-serif" font-size="12" fill="#374151">• Led migration to microservices — cut deployment time from 2hr to 12min</text>
  <text x="626" y="300" font-family="Arial,sans-serif" font-size="12" fill="#374151">• Mentored 4 junior engineers; 3 promoted within 18 months</text>

  <rect x="626" y="316" width="468" height="1" fill="#f3f4f6"/>

  <text x="626" y="338" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#111827">Software Engineer — StartupXYZ</text>
  <text x="1094" y="338" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="end">2019 – 2021</text>
  <text x="626" y="358" font-family="Arial,sans-serif" font-size="12" fill="#374151">• Built real-time dashboard processing 50K events/sec with Node.js + Redis</text>
  <text x="626" y="376" font-family="Arial,sans-serif" font-size="12" fill="#374151">• Increased test coverage from 42% to 91%; reduced production bugs by 73%</text>

  <text x="626" y="412" font-family="Arial,sans-serif" font-size="10" font-weight="800" fill="#2563eb" letter-spacing="1.5">SKILLS</text>
  <rect x="626" y="416" width="468" height="1.5" fill="#dbeafe"/>
  <text x="626" y="438" font-family="Arial,sans-serif" font-size="12" fill="#374151">Python · Node.js · PostgreSQL · AWS · Kubernetes · Redis · GraphQL · CI/CD</text>

  <text x="626" y="472" font-family="Arial,sans-serif" font-size="10" font-weight="800" fill="#2563eb" letter-spacing="1.5">EDUCATION</text>
  <rect x="626" y="476" width="468" height="1.5" fill="#dbeafe"/>
  <text x="626" y="498" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#111827">B.S. Computer Science — UC Berkeley</text>
  <text x="626" y="518" font-family="Arial,sans-serif" font-size="12" fill="#6b7280">GPA 3.8 · Dean's List · ACM Club President</text>

  <!-- Match score badge -->
  <rect x="970" y="442" width="110" height="110" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="1025" y="485" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#166534" text-anchor="middle">JOB MATCH</text>
  <text x="1025" y="522" font-family="Arial,sans-serif" font-size="34" font-weight="900" fill="#16a34a" text-anchor="middle">97%</text>
  <text x="1025" y="542" font-family="Arial,sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">●●●●●</text>

