  <text x="98" y="481" font-family="Arial,sans-serif" font-size="16" fill="white" font-weight="600">100+ professional templates</text>

  <circle cx="72" cy="516" r="14" fill="rgba(255,255,255,0.15)"/>
  <text x="72" y="521" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle">✓</text>
  <text x="98" y="521" font-family="Arial,sans-serif" font-size="16" fill="white" font-weight="600">AI cover letter included</text>

