  <text x="74" y="78" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">R</text>
  <text x="112" y="79" font-family="Arial,sans-serif" font-size="18" font-weight="800" fill="white">ResumeTailored</text>
