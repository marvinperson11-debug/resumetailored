<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#f5f3ff"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#2563eb" flood-opacity="0.12"/>
    </filter>
    <filter id="cs">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect width="1200" height="6" fill="url(#btnGrad)"/>

  <!-- Logo row -->
  <rect x="60" y="40" width="44" height="44" rx="11" fill="#2563eb"/>
  <text x="82" y="70" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">R</text>
  <text x="120" y="69" font-family="Arial,sans-serif" font-size="19" font-weight="800" fill="#111827">ResumeTailored</text>
  <rect x="312" y="53" width="26" height="19" rx="5" fill="#2563eb"/>
  <text x="325" y="67" font-family="Arial,sans-serif" font-size="11" font-weight="900" fill="white" text-anchor="middle">AI</text>

  <!-- Big stat -->
  <text x="600" y="180" font-family="Arial,sans-serif" font-size="96" font-weight="900" fill="#2563eb" text-anchor="middle" letter-spacing="-4">3×</text>
  <text x="600" y="240" font-family="Arial,sans-serif" font-size="30" font-weight="800" fill="#111827" text-anchor="middle" letter-spacing="-0.5">more interviews with an AI-tailored resume</text>
  <text x="600" y="285" font-family="Arial,sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">Our users report 3x more callbacks after switching to ResumeTailored AI</text>

  <!-- Three stat cards -->
  <rect x="80" y="330" width="320" height="200" rx="20" fill="white" filter="url(#cs)"/>
  <text x="240" y="395" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#2563eb" text-anchor="middle">97%</text>
  <text x="240" y="430" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#374151" text-anchor="middle">ATS Pass Rate</text>
  <text x="240" y="455" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">vs. 43% industry avg</text>
  <rect x="160" y="478" width="160" height="3" rx="2" fill="#dbeafe"/>
  <text x="240" y="510" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">keyword-matched to every job</text>

  <rect x="440" y="330" width="320" height="200" rx="20" fill="white" filter="url(#cs)"/>
  <text x="600" y="395" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#7c3aed" text-anchor="middle">30s</text>
  <text x="600" y="430" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#374151" text-anchor="middle">Time to Tailor</text>
  <text x="600" y="455" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">paste job → download</text>
  <rect x="520" y="478" width="160" height="3" rx="2" fill="#ede9fe"/>
  <text x="600" y="510" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">faster than any competitor</text>

  <rect x="800" y="330" width="320" height="200" rx="20" fill="white" filter="url(#cs)"/>
  <text x="960" y="395" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#0891b2" text-anchor="middle">100+</text>
  <text x="960" y="430" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#374151" text-anchor="middle">Templates</text>
  <text x="960" y="455" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">resume + cover letter</text>
  <rect x="880" y="478" width="160" height="3" rx="2" fill="#cffafe"/>
  <text x="960" y="510" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">ATS-friendly &amp; recruiter-approved</text>

  <!-- CTA area -->
  <rect x="400" y="565" width="400" height="56" rx="14" fill="url(#btnGrad)"/>
  <text x="600" y="600" font-family="Arial,sans-serif" font-size="19" font-weight="800" fill="white" text-anchor="middle">Start Free — No Payment Required</text>

  <!-- URL -->
  <text x="600" y="647" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">resumetailored.com</text>

  <!-- Bottom accent -->
  <rect x="0" y="669" width="1200" height="6" fill="url(#btnGrad)"/>
</svg>
