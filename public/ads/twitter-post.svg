  <text x="220" y="508" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">Per application</text>

  <rect x="400" y="448" width="320" height="80" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="560" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#16a34a">✅ Never lies</text>
  <text x="560" y="508" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">Only rewrites your real experience</text>

  <rect x="740" y="448" width="320" height="80" rx="12" fill="#fef3c7" stroke="#fde68a" stroke-width="2"/>
  <text x="900" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#d97706">🆓 Free to start</text>
