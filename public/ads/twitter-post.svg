  <!-- Blue left bar -->
  <rect x="0" y="0" width="8" height="675" fill="#2563eb"/>

  <!-- Header -->
  <text x="60" y="72" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#2563eb">ResumeTailored AI</text>
  <text x="60" y="104" font-family="Arial, sans-serif" font-size="18" fill="#6b7280">@resumetailored · resumetailored.com</text>

  <!-- Divider -->
