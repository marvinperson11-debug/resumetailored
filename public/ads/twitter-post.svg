  <!-- Big stat -->
  <text x="60" y="230" font-family="Arial, sans-serif" font-size="110" font-weight="900" fill="#111827">3×</text>
  <text x="60" y="308" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="#2563eb">more interviews.</text>
  <text x="60" y="368" font-family="Arial, sans-serif" font-size="28" fill="#4b5563">Job seekers using ResumeTailored AI get</text>
  <text x="60" y="406" font-family="Arial, sans-serif" font-size="28" fill="#4b5563">3× more callbacks than those applying manually.</text>

  <!-- Features row -->
  <rect x="60" y="448" width="320" height="80" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
