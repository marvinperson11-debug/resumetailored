  <text x="120" y="1502" font-family="Arial,sans-serif" font-size="28" text-anchor="middle">📄</text>
  <text x="178" y="1484" font-family="Arial,sans-serif" font-size="20" font-weight="800" fill="#111827">100+ Templates</text>
  <text x="178" y="1508" font-family="Arial,sans-serif" font-size="16" fill="#6b7280">Professional, ATS-friendly resume &amp; cover letter designs</text>

  <circle cx="120" cy="1580" r="36" fill="#eff6ff"/>
  <text x="120" y="1592" font-family="Arial,sans-serif" font-size="28" text-anchor="middle">✉️</text>
