  <text x="92" y="862" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" font-weight="700">EXPERIENCE</text>
  <text x="92" y="888" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#374151">Software Engineer</text>
  <text x="92" y="912" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">• Worked on backend systems</text>
  <text x="92" y="934" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">• Helped with database stuff</text>
  <text x="92" y="956" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">• Did some code reviews</text>
  <text x="92" y="978" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">• Attended team meetings</text>
  <text x="92" y="1000" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">• Wrote documentation</text>
  <rect x="92" y="1020" width="220" height="1.5" fill="#f3f4f6"/>
