  <circle cx="120" cy="1400" r="36" fill="#eff6ff"/>
  <text x="120" y="1412" font-family="Arial,sans-serif" font-size="28" text-anchor="middle">⚡</text>
  <text x="178" y="1394" font-family="Arial,sans-serif" font-size="20" font-weight="800" fill="#111827">Instant Tailoring</text>
