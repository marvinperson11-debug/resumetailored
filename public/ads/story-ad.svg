  <text x="92" y="1068" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="#ef4444">No callbacks ✕</text>
  <text x="92" y="1092" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">Generic — ignored by ATS</text>
