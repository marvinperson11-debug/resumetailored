  <circle cx="120" cy="1670" r="36" fill="#eff6ff"/>
  <text x="120" y="1682" font-family="Arial,sans-serif" font-size="28" text-anchor="middle">🆓</text>
  <text x="178" y="1664" font-family="Arial,sans-serif" font-size="20" font-weight="800" fill="#111827">Free to Start</text>
  <text x="178" y="1688" font-family="Arial,sans-serif" font-size="16" fill="#6b7280">1 free tailoring per day — no payment required</text>

  <!-- CTA button -->
  <rect x="100" y="1768" width="880" height="80" rx="20" fill="url(#btnGrad)"/>
  <text x="540" y="817" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle" dy="1000">Start for Free →</text>
  <text x="540" y="1832" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.9)" text-anchor="middle">No payment required</text>

  <!-- URL -->
  <text x="540" y="1888" font-family="Arial,sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">resumetailored.com</text>

  <!-- Bottom bar -->
  <rect x="0" y="1914" width="1080" height="6" fill="url(#btnGrad)"/>
