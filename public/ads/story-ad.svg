  <text x="88" y="118" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">R</text>
  <text x="134" y="117" font-family="Arial,sans-serif" font-size="22" font-weight="800" fill="white">ResumeTailored</text>
  <rect x="350" y="97" width="32" height="22" rx="6" fill="rgba(255,255,255,0.3)"/>
  <text x="366" y="113" font-family="Arial,sans-serif" font-size="12" font-weight="900" fill="white" text-anchor="middle">AI</text>

