  <text x="612" y="862" font-family="Arial,sans-serif" font-size="12" fill="#2563eb" font-weight="800">EXPERIENCE</text>
  <text x="612" y="888" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#111827">Senior Software Engineer</text>
  <text x="612" y="912" font-family="Arial,sans-serif" font-size="13" fill="#374151">• Cut API latency 40% — 3M req/day</text>
  <text x="612" y="934" font-family="Arial,sans-serif" font-size="13" fill="#374151">• Optimized DB — 65% faster</text>
  <text x="612" y="956" font-family="Arial,sans-serif" font-size="13" fill="#374151">• Led 5-engineer team, shipped</text>
  <text x="612" y="974" font-family="Arial,sans-serif" font-size="13" fill="#374151">  3 features on schedule</text>
  <text x="612" y="996" font-family="Arial,sans-serif" font-size="13" fill="#374151">• 97% ATS keyword match</text>
