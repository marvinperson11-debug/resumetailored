  <text x="612" y="1064" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="#16a34a">3 interviews ✓</text>
  <text x="612" y="1088" font-family="Arial,sans-serif" font-size="13" fill="#6b7280">In the first week</text>
  <text x="612" y="1108" font-family="Arial,sans-serif" font-size="13" fill="#6b7280">after using ResumeTailored AI</text>

