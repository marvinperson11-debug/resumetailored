  <text x="540" y="300" font-family="Arial,sans-serif" font-size="76" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">Land More</text>
  <text x="540" y="390" font-family="Arial,sans-serif" font-size="76" font-weight="900" fill="#93c5fd" text-anchor="middle" letter-spacing="-2">Interviews</text>
  <text x="540" y="480" font-family="Arial,sans-serif" font-size="76" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">with AI.</text>

  <text x="540" y="560" font-family="Arial,sans-serif" font-size="26" fill="rgba(255,255,255,0.8)" text-anchor="middle">Tailored resumes in 30 seconds</text>
  <text x="540" y="596" font-family="Arial,sans-serif" font-size="26" fill="rgba(255,255,255,0.8)" text-anchor="middle">— matched to every job you apply for</text>

  <!-- Before / After cards -->
  <!-- Before card -->
  <rect x="60" y="720" width="440" height="520" rx="24" fill="#fff" filter="url(#cs)" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="60" y="720" width="440" height="56" rx="24" fill="#f9fafb"/>
  <rect x="60" y="748" width="440" height="28" fill="#f9fafb"/>
  <text x="280" y="755" font-family="Arial,sans-serif" font-size="14" font-weight="800" fill="#9ca3af" text-anchor="middle" letter-spacing="1">📄 BEFORE</text>

  <text x="92" y="818" font-family="Arial,sans-serif" font-size="20" font-weight="800" fill="#374151">Generic Resume</text>
