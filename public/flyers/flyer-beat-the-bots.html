<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:800px; height:600px; overflow:hidden;
  font-family:'Inter',system-ui,sans-serif;
  background:#030712;
  position:relative;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px;
}

/* Neon glow orbs */
.orb {
  position:absolute; border-radius:50%; pointer-events:none; filter:blur(80px);
}
.o1 { width:360px; height:360px; top:-100px; left:-80px; background:rgba(99,102,241,0.18); }
.o2 { width:280px; height:280px; bottom:-80px; right:-60px; background:rgba(16,185,129,0.14); }
.o3 { width:180px; height:180px; top:50px; right:100px; background:rgba(139,92,246,0.12); }

.logo {
  position:absolute; top:22px; left:24px;
  display:flex; align-items:center; gap:8px;
}
.logo-mark {
  width:30px; height:30px;
  background:linear-gradient(135deg,#6366F1,#8B5CF6);
  border-radius:7px; display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:15px; color:white;
}
.logo-text { color:#e2e8f0; font-size:13px; font-weight:600; }

/* Big stat */
.stat-row {
  display:flex; align-items:baseline; gap:12px; margin-bottom:10px;
}
.stat-num {
  font-size:110px; font-weight:900; line-height:1;
  background:linear-gradient(135deg,#6366F1 0%,#8B5CF6 50%,#10b981 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  letter-spacing:-6px; filter:drop-shadow(0 0 30px rgba(99,102,241,0.4));
}
.stat-pct {
  font-size:52px; font-weight:900;
  background:linear-gradient(135deg,#8B5CF6,#10b981);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  letter-spacing:-2px;
}

.stat-desc {
  font-size:17px; color:#94a3b8; line-height:1.5; margin-bottom:28px; max-width:520px;
  text-align:center;
}
.stat-desc strong { color:#e2e8f0; }

/* Divider */
.divider {
  width:60px; height:3px;
  background:linear-gradient(90deg,#6366F1,#10b981);
  border-radius:2px; margin:0 auto 24px;
}

/* CTA row */
.cta-row { display:flex; align-items:center; gap:16px; }
.cta-btn {
  background:linear-gradient(135deg,#6366F1,#8B5CF6);
  color:white; padding:13px 28px; border-radius:12px;
  font-size:14px; font-weight:800;
  box-shadow:0 0 30px rgba(99,102,241,0.5);
  white-space:nowrap;
}
.cta-note {
  font-size:12px; color:#64748b; line-height:1.5;
}
.cta-note strong { color:#10b981; }

.footer {
  position:absolute; bottom:16px;
  font-size:11.5px; color:#475569;
}
.footer span { color:#6366F1; font-weight:700; }

/* Top warning tag */
.warn-tag {
  position:absolute; top:22px; right:22px;
  background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3);
  color:#f87171; padding:5px 12px; border-radius:999px;
  font-size:10.5px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>

<div class="logo">
  <div class="logo-mark">R</div>
  <span class="logo-text">ResumeTailored AI</span>
</div>
<div class="warn-tag">⚠ ATS REJECTION RISK</div>

<div class="stat-row">
  <span class="stat-num">75</span><span class="stat-pct">%</span>
</div>

<p class="stat-desc">
  of resumes are <strong>rejected by ATS bots</strong> before a human ever reads them.<br>
  Is yours one of them?
</p>

<div class="divider"></div>

<div class="cta-row">
  <div class="cta-btn">⚡ Scan Your Resume FREE</div>
  <div class="cta-note">
    Get your ATS score in seconds.<br>
    <strong>Free, forever. No card needed.</strong>
  </div>
</div>

<div class="footer">Beat the bots at <span>resumetailored.com</span></div>
</body>
</html>
