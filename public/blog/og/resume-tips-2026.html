<!DOCTYPE html>
<html>
<head>
  <meta name="robots" content="noindex">
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  width:1200px;height:630px;overflow:hidden;
  font-family:'Inter',system-ui,sans-serif;
  background:#030712;
  background-image:
    radial-gradient(ellipse 70% 70% at 20% 50%, rgba(99,102,241,0.18), transparent),
    radial-gradient(ellipse 50% 60% at 90% 20%, rgba(139,92,246,0.12), transparent),
    linear-gradient(rgba(99,102,241,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,102,241,0.04) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,56px 56px,56px 56px;
  display:flex;align-items:center;
  padding:80px 96px;
  gap:60px;
}
.left{flex:1;}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#6366F1,#8B5CF6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:white;}
.logo-name{font-size:16px;font-weight:700;color:rgba(255,255,255,0.7);}
.tag{display:inline-block;padding:6px 16px;border-radius:999px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:24px;background:rgba(255,255,255,0.08);color:#a78bfa;border:1px solid #a78bfa40;}
h1{font-size:52px;font-weight:900;line-height:1.08;letter-spacing:-2px;color:#f1f5f9;margin-bottom:24px;}
.domain{font-size:18px;color:#6366F1;font-weight:700;}
.right{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:16px;}
.score-card{background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.3);border-radius:20px;padding:28px 24px;text-align:center;}
.score-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#6366F1;margin-bottom:10px;}
.score-num{font-size:52px;font-weight:900;letter-spacing:-3px;background:linear-gradient(135deg,#6366F1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.score-sub{font-size:12px;color:#64748b;}
.free-pill{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);border-radius:12px;padding:14px 16px;text-align:center;}
.free-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#10b981;margin-bottom:4px;}
.free-val{font-size:14px;font-weight:800;color:#e2e8f0;}
</style>
</head>
<body>
<div class="left">
  <div class="logo-row">
    <div class="logo-mark">R</div>
    <span class="logo-name">ResumeTailored AI</span>
  </div>
  <div class="tag">Resume Writing</div>
  <h1>10 Resume Tips for More Interviews in 2026</h1>
  <div class="domain">resumetailored.com/blog</div>
</div>
<div class="right">
  <div class="score-card">
    <div class="score-label">ATS Score</div>
    <div class="score-num">91</div>
    <div class="score-sub">Free to check</div>
  </div>
  <div class="free-pill">
    <div class="free-label">Free Tool</div>
    <div class="free-val">No sign-up needed</div>
  </div>
</div>
</body>
</html>
