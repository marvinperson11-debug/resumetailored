<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Blue rounded square background -->
  <rect width="64" height="64" rx="13" fill="#2563eb"/>

  <!-- White document body -->
  <rect x="16" y="11" width="28" height="36" rx="3" fill="white"/>

  <!-- Document fold corner -->
  <polygon points="36,11 44,19 36,19" fill="#dbeafe"/>

  <!-- Horizontal lines representing resume text -->
  <rect x="20" y="24" width="20" height="2.5" rx="1.25" fill="#2563eb" opacity="0.35"/>
  <rect x="20" y="29" width="15" height="2.5" rx="1.25" fill="#2563eb" opacity="0.25"/>
  <rect x="20" y="34" width="18" height="2.5" rx="1.25" fill="#2563eb" opacity="0.25"/>
  <rect x="20" y="39" width="12" height="2.5" rx="1.25" fill="#2563eb" opacity="0.2"/>

  <!-- Gold star / AI sparkle badge in top-right corner -->
  <circle cx="46" cy="18" r="9" fill="#f59e0b"/>
  <!-- 4-point star path -->
  <path d="M46 11 L47.5 16.5 L53 18 L47.5 19.5 L46 25 L44.5 19.5 L39 18 L44.5 16.5 Z" fill="white"/>
