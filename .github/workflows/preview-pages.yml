name: Deploy landing-page preview to GitHub Pages

# Publishes the static public/ folder to GitHub Pages so the landing page
# (including the new spotlight showcase section) can be previewed live.
# Note: requires Settings -> Pages -> Source = "GitHub Actions" to be set once.

on:
  push:
    branches:
      - claude/motion-npm-install-pfl8js
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload public/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
